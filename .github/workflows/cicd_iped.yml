name: CI/CD IPED Snapshot

on:
  workflow_dispatch: # Permite rodar manualmente no botão "Run workflow" sem precisar de tag
name: Compilar IPED Snapshot

on: 
  workflow_dispatch: # É isso aqui que cria o botão de apertar e rodar no GitHub!

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3      
      
    - name: Docker login      
      run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_TOKEN }}  

    # ==========================================
    # 1. DEPENDÊNCIAS (Usa cache pra não demorar 20 anos de novo)
    # CACHE E DEPENDÊNCIAS (Pra não compilar CUDA do zero)
    # ==========================================
    - name: Docker pull dependecies 
      run: docker pull joaca/iped:dependencies || echo "Sem cache anterior"

    - name: Docker build dependecies 
      run: docker build --cache-from joaca/iped:dependencies . -f Dockerfile.dependencies -t joaca/iped:dependencies

    - name: Docker push dependecies 
      run: docker push joaca/iped:dependencies 

    # ==========================================
    # 2. PROCESSOR (Motor do IPED - Forçando o Snapshot com a sua senha)
    # COMPILA O SNAPSHOT (Usa o Token em Segredo)
    # ==========================================
    - name: Docker build processor-SNAPSHOT 
      uses: docker/build-push-action@v5      
      with:
        context: .
        file: Dockerfile.processor
        tags: joaca/iped:processor-snapshot
        push: true 
        build-args: |
          SNAPSHOT=true
        secrets: |
          "ACTION_GH_TOKEN=${{ secrets.ACTION_GH_TOKEN }}"

    - name: Tag processor-snapshot como processor
      # Este step assume que o docker login já foi feito acima.
      run: |
        docker pull joaca/iped:processor-snapshot
        docker tag joaca/iped:processor-snapshot joaca/iped:processor
        docker push joaca/iped:processor

    # ==========================================
    # 3. IMAGEM FINAL (O pacote completo pra galera usar)
    # MONTA A IMAGEM FINAL (Com Interface)
    # ==========================================
    - name: Docker build iped-SNAPSHOT 
    - name: Docker build iped-GUI-SNAPSHOT
      uses: docker/build-push-action@v5      
      with:
        context: .        
        tags: joaca/iped:snapshot
        push: true
